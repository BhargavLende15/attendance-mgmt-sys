# Server Configuration - Using port 8086
server.port=8086

# Application Info
spring.application.name=attendance-management-system

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:attendancedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# App Info
info.app.name=Attendance Management System
info.app.version=1.0.0
info.app.description=CI/CD Demo Application

# Logging
logging.level.com.attendance=INFO
logging.level.org.springframework.web=WARN

# CORS
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
